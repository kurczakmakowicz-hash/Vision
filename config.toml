# Vision configuration — hand-editable. Later tiers add [voice], [heartbeat],
# [rails], and [cost] sections; for Tier 1 only the model + effort matter.

model = "claude-opus-4-8"
effort = "high"               # low | medium | high | xhigh | max

[voice]
ptt_key = "space"             # hold this key to talk (the `/voice` command)
input_device = ""             # "" = system default microphone
output_device = ""            # "" = system default speaker
stt_language = "en-US"
tts_voice_id = "sB7vwSCyX0tQmU24cW2C"   # your chosen ElevenLabs voice

[heartbeat]
interval_seconds = 5                  # how often the loop ticks
confirm_timeout_seconds = 120         # heartbeat confirmations time out -> deny
quiet_hours = { start = "22:00", end = "07:00" }

# Each check is its own small unit. To try it: `echo "ping" > var/trigger`, and
# the next tick surfaces "ping". Quiet by default — most checks say nothing.
[[heartbeat.checks]]
name = "trigger_watch"
interval_seconds = 5
handler = "watch_trigger"

[rails]
# The "never without asking" list — these always stop for a yes before running.
consequential_tools = [
    "send_email", "send_message", "send_social_post", "spend_money",
    "delete_reminder", "edit_file", "forget_fact",
]
kill_switch = false           # /kill engages, /resume releases (persisted)

[cost]
input_per_mtok = 5.0          # claude-opus-4-8 pricing, for the running tally
output_per_mtok = 25.0
budget_warn_usd = 5.0

[claude_code]
# How much autonomy the delegated Claude Code agent gets:
#   acceptEdits      = it can edit files (safe default)
#   bypassPermissions = full autonomy, incl. running commands/tests
permission_mode = "acceptEdits"
max_turns = 30
timeout_seconds = 600
